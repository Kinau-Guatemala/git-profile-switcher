name: Bug report
description: Report a defect, regression, packaging problem, or incorrect Git/SSH behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include exact Git, OS, and install details so the issue can be reproduced safely.

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. v1.0.0 or commit SHA
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - GitHub Release asset
        - Local dev build
        - Built from source
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the broken behavior.
      placeholder: Tell us what failed and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open the app
        2. Create or switch profile ...
        3. Run git command ...
        4. Observe the issue
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Relevant logs or config output
      description: Paste safe, redacted output from `git config --show-origin --list`, app errors, or screenshots. Do not include private keys or secrets.
      render: shell